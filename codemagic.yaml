# Codemagic build pipelines for the ASMR Sleeps app.
#
# Standing team-level setup in Codemagic (already configured, shared across
# all athletedomains apps — do not recreate):
#   - App Store Connect API integration named `Pregame` (must be App Manager
#     access level, not Limited).
#   - Apple Distribution certificate, team-wide, generated/uploaded once.
#   - Apple Developer Team ID: Q3UH3Y4QUU
#
# One-time per-app UI step required before the first build will succeed:
#   Codemagic Team settings -> codemagic.yaml settings -> Code signing
#   identities -> iOS provisioning profiles tab -> Fetch profiles.
#   Find or have Codemagic create an App Store profile for
#   com.athletedomains.asmrsleep, Download selected, assign a Reference
#   name (e.g. asmr_sleeps_appstore).
#
#   Skipping this = every build fails with "no matching profiles found".
#
# Optional once you have a TestFlight beta group set up in App Store
# Connect: uncomment beta_groups under publishing to auto-distribute on
# upload.
#
# ios/ is intentionally gitignored - Capacitor regenerates it on every
# Codemagic build, so this workflow runs `cap add ios` before syncing.

workflows:
  ios-testflight:
    name: iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: Pregame

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.athletedomains.asmrsleep
      vars:
        APP_STORE_APPLE_ID: 6769982115
        BUNDLE_ID: com.athletedomains.asmrsleep
        APPLE_TEAM_ID: Q3UH3Y4QUU
        XCODE_SCHEME: "App"
      node: 22.11.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Build web bundle
        script: npm run build

      - name: Add and sync iOS platform
        script: |
          set -e
          echo "=========================================="
          echo "PRE-ADD DIAGNOSTICS"
          echo "=========================================="
          echo "node: $(node --version)"
          echo "npm: $(npm --version)"
          echo "cap: $(npx cap --version)"
          echo "pod on PATH: $(which pod || echo NO)"
          echo "pod version: $(pod --version 2>/dev/null || echo N/A)"
          echo ""
          echo "@capacitor/ios installed?"
          ls -la node_modules/@capacitor/ios 2>&1 | head -5 || echo "(not installed)"
          echo ""
          echo "cap doctor output:"
          npx cap doctor || true
          echo ""
          echo "=========================================="
          echo "CAP ADD IOS"
          echo "=========================================="
          if [ ! -d "ios" ]; then
            npx cap add ios
          else
            echo "ios/ already exists, skipping cap add"
          fi
          echo ""
          echo "=========================================="
          echo "CAP SYNC IOS"
          echo "=========================================="
          npx cap sync ios
          echo ""
          echo "=========================================="
          echo "POST-SYNC LAYOUT"
          echo "=========================================="
          if [ ! -d "ios" ]; then
            echo "FATAL: ios/ directory was NOT created by cap add+sync"
            exit 1
          fi
          echo "--- ios/ tree (depth 4) ---"
          find ios -maxdepth 4 -type d
          echo ""
          echo "--- All files in ios/ (depth 4, first 80) ---"
          find ios -maxdepth 4 -type f | head -80
          echo ""
          echo "--- Podfile locations ---"
          find ios -name "Podfile" -not -path "*/Pods/*" || echo "(none)"
          echo "=========================================="

      - name: Install CocoaPods dependencies
        script: |
          set -e
          PODFILE=$(find ios -name "Podfile" -not -path "*/Pods/*" | head -1)
          if [ -z "$PODFILE" ]; then
            echo "No Podfile found in ios/. Layout:"
            find ios -maxdepth 4 -type d 2>&1 || echo "(ios/ doesn't exist)"
            echo ""
            echo "All files in ios/:"
            find ios -type f 2>&1 | head -50 || true
            exit 1
          fi
          PODFILE_DIR=$(dirname "$PODFILE")
          echo "Running pod install in $PODFILE_DIR"
          cd "$PODFILE_DIR"
          pod install

      - name: Set build number from App Store Connect
        script: |
          set -e
          XCODEPROJ_DIR=$(dirname $(find ios -name "App.xcodeproj" -type d | head -1))
          cd "$XCODEPROJ_DIR"
          LATEST_BUILD=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" || echo "0")
          NEW_BUILD=$((LATEST_BUILD + 1))
          agvtool new-version -all $NEW_BUILD

      - name: Apply signing profiles to Xcode project
        # Required even with ios_signing: block — generates
        # /Users/builder/export_options.plist that xcode-project build-ipa
        # needs. Pulls the pre-fetched profile/cert from Codemagic's
        # Code signing identities store; does NOT create them.
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          set -e
          WORKSPACE=$(find ios -name "App.xcworkspace" -type d | head -1)
          echo "Building $WORKSPACE / scheme $XCODE_SCHEME"
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Uncomment once you have a beta group set up in TestFlight to
        # auto-distribute after Apple's processing finishes:
        # beta_groups:
        #   - Internal Testers
