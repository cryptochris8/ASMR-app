<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com data:; script-src 'self'; connect-src 'self'; img-src 'self' data: blob:; object-src 'none'; base-uri 'none'; frame-ancestors 'none';">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <title>ASMR Sleep</title>
  <style>
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
    /* Default focus ring for keyboard users only. Per-component styles may override the offset/color. */
    button:focus-visible, [role="button"]:focus-visible, input:focus-visible, [tabindex]:focus-visible, a:focus-visible {
      outline: 2px solid #a393d3;
      outline-offset: 3px;
      border-radius: 4px;
    }
    /* Suppress the default focus ring on pointer/touch interactions. */
    button:focus:not(:focus-visible),
    [role="button"]:focus:not(:focus-visible),
    input:focus:not(:focus-visible) {
      outline: none;
    }
    /* All buttons: consistent reset that respects platform conventions. */
    button {
      font: inherit;
      color: inherit;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }
    /* Improve scrollbar look on overflowing UI panels. */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e1e2e; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #2a2a3e; }
  </style>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #0a0a14;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      color: #e8e4df;
    }
    #app {
      width: 100%; height: 100%; position: relative;
    }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <main id="app" role="main" aria-label="ASMR Sleep app"></main>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
